name: 🔄 Sync Fork with Upstream
on:
  schedule:
    - cron: '0 0 * * *'  # UTC 每天0点执行（中国时间8点）
  workflow_dispatch:     # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史
          persist-credentials: false

      - name: 配置 Git 用户
        run: |
          git config --global user.name "LiZhaoYangClub"
          git config --global user.email "948792324@qq.com"

      - name: 添加上游仓库
        run: git remote add upstream https://github.com/ufrisk/pcileech.git

      - name: 拉取上游最新代码
        run: git fetch upstream

      - name: 合并上游更新到 master 分支
        run: |
          git checkout master
          git merge --allow-unrelated-histories upstream/master

      - name: 推送到自己的 Fork
        run: git push origin master
